<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>shikoku2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Noto Sans TC & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- KaTeX 數學公式自動渲染 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

    <style>
        body {
            font-family: 'Noto Sans TC', 'Hiragino Kaku Gothic ProN', 'PingFang TC', sans-serif;
            font-weight: 300; /* 思源黑體 輕 */
            background-color: #FAF8F5; /* 文青暖砂紙張色 */
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100dvh;
        }
        .serif-title {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
        }
        .active-tab {
            color: #1A303A; /* 深邃海藍 */
            font-weight: 700;
        }
        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 毛玻璃與手繪質感輕陰影 */
        .glass {
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .hand-card {
            border: 1px solid #E2DCD5;
            box-shadow: 0 4px 12px rgba(26, 48, 58, 0.03);
            background-color: #FFFFFF;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="text-slate-700 antialiased">

    <!-- iOS 滿版獨立 App 容器 (模擬器 & 寬螢幕自我調適) -->
    <div class="app-container w-full max-w-md h-screen relative mx-auto bg-[#FAF8F5] md:shadow-2xl overflow-hidden">
        
        <!-- 1. 開屏手繪海邊故事頁 (Splash Screen) -->
        <div id="splash-screen" class="absolute inset-0 z-50 bg-cover bg-center flex flex-col items-center justify-start pointer-events-auto transition-all duration-700" style="background-image: url('https://i.ibb.co/sdjvQZXK/05a5e65565cd1919a84950206637bfd3.jpg');">
            <!-- 密碼框完全固定在最頂部 (螢幕上方 6% 處)，高度避讓背景中下方的車子與人物 -->
            <div class="mt-[6vh] w-11/12 max-w-[340px] glass border border-white/20 p-5 rounded-[24px] shadow-2xl flex flex-col items-center space-y-4">
                <div class="text-center">
                    <h2 class="serif-title text-xl font-black text-[#1A303A] tracking-widest">shikoku2026</h2>
                    <p class="text-[10px] text-slate-500 font-bold mt-1 tracking-wider">輸入密碼解鎖自駕之旅</p>
                </div>
                <div class="w-full flex flex-col gap-2.5">
                    <input id="splash-passcode" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="請輸入 6 位密碼" class="w-full px-4 py-3 rounded-2xl border border-[#E2DCD5] bg-white/90 text-[#1A303A] text-center font-black tracking-[0.4em] text-sm focus:outline-[#1A303A]">
                    <button onclick="verifyPasscode()" class="w-full py-3 bg-[#1A303A] text-white font-bold text-xs rounded-2xl shadow-md flex items-center justify-center gap-1.5 active:scale-95 transition-all tracking-widest">
                        <i class="fa-solid fa-paper-plane text-orange-400"></i> 開啟日本四國之旅
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. 主體佈局容器 (預設 hidden 防止未解鎖前渲染走位) -->
        <div id="main-app-layout" class="hidden w-full h-full relative">
            
            <!-- 頂部固定的 Header -->
            <header class="absolute top-0 left-0 right-0 h-[72px] bg-white border-b border-[#E2DCD5] px-5 py-4 z-30 flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="serif-title text-2xl font-black tracking-widest text-[#1A303A]">shikoku2026</h1>
                    <span class="text-[10px] font-bold text-slate-400 tracking-wider mt-0.5">四國2026自駕遊</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-black text-amber-600 bg-amber-50 border border-amber-100 px-2 py-0.5 rounded-md">MIO MIO 專屬</span>
                    <span class="text-[9px] text-slate-400 font-bold mt-1">2026.07.24 - 07.30</span>
                </div>
            </header>

            <!-- 中間獨立滑動的視窗 -->
            <main id="app-viewport" class="absolute top-[72px] bottom-[64px] left-0 right-0 overflow-y-auto no-scrollbar px-4 py-5 space-y-5">
                <!-- 內容由 JS 動態切換渲染 -->
            </main>

            <!-- 底部固定的 TabBar 導航列 -->

        <!-- 3. 正中央懸浮卡片彈窗 (Tap-to-close) -->

        <!-- 4. 發現分享數據的雲端匯入置中彈出視窗 -->

        <!-- 5. 縮短版分享網址置中彈出視窗 -->

                    <h3 class="text-sm font-black text-[#1A303A] flex items-center gap-1.5">
                        <i class="fa-solid fa-share-nodes text-orange-400"></i> 分享同步網址

                    <button onclick="closeShareModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>

        <!-- 6. 新增/編輯自定義行程置中彈出視窗 -->
        <div id="add-event-modal" class="absolute inset-0 z-50 bg-[#1A303A]/60 backdrop-blur-sm hidden flex items-center justify-center p-4" onclick="closeAddEventModal()">
            <div class="bg-white w-full max-w-[340px] rounded-[24px] p-5 space-y-3 animate-slide-up shadow-2xl" onclick="event.stopPropagation()">

                    <div>

                        <input id="new-event-title" type="text" placeholder="例如: 瓦町星巴克咖啡館" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-[#1A303A]">

                    <div class="grid grid-cols-2 gap-2">

                                <option value="餐飲">餐飲 🍽️</option>
                                <option value="交通">交通 🚗</option>

                    </div>
                    <div class="grid grid-cols-2 gap-2">

                            <label class="block text-[10px] font-bold text-slate-400 mb-0.5">Google Maps 網址</label>
                            <input id="new-event-gmaps" type="text" placeholder="https://..." class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-[#1A303A]">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-0.5">車載 Mapcode</label>
                            <input id="new-event-mapcode" type="text" placeholder="如: 60 607 721*12" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-[#1A303A]">

                <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
                    <button onclick="closeAddEventModal()" class="py-2 bg-slate-100 text-slate-600 font-bold rounded-lg text-xs">取消</button>
                    <button onclick="submitNewEvent()" class="py-2 bg-[#1A303A] text-white font-bold rounded-lg text-xs">儲存日程</button>
                </div>
            </div>
        </div>

        <!-- 7. 新增/編輯憑證置中彈出視窗 -->
        <div id="add-voucher-modal" class="absolute inset-0 z-50 bg-[#1A303A]/60 backdrop-blur-sm hidden flex items-center justify-center p-4" onclick="closeAddVoucherModal()">

                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-0.5">日期/天數 *</label>
                            <input id="voucher-time" type="text" placeholder="例如: Day 3 或 7/26" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-[#1A303A]">

                            <input id="voucher-code" type="text" placeholder="例如: 0407270902" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-[#1A303A]">

                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-0.5">相關圖片網址 (可選)</label>
                        <input id="voucher-img" type="text" placeholder="https://..." class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-[#1A303A]">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-0.5">詳細備註與政策</label>
                        <textarea id="voucher-desc" placeholder="請填寫相關政策、預約注意事項等..." class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs h-16 resize-none focus:outline-[#1A303A]"></textarea>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
                    <button onclick="closeAddVoucherModal()" class="py-2 bg-slate-100 text-slate-600 font-bold rounded-lg text-xs">取消</button>
                    <button onclick="submitVoucher()" class="py-2 bg-[#1A303A] text-white font-bold rounded-lg text-xs">儲存憑證</button>
                </div>

    </div>

    <!-- JavaScript 驅動邏輯 -->
    <script>
        // --- 烤吐司通知卡片 (替代阻斷性的 alert) ---
        function showNotification(msg, type = "info") {
            const container = document.createElement('div');
            container.className = "absolute bottom-20 left-1/2 -translate-x-1/2 z-[99] px-5 py-2.5 rounded-2xl text-[10px] font-bold text-white shadow-xl animate-slide-up transition-opacity duration-300 " + 
                (type === "error" ? "bg-red-500" : "bg-[#1A303A]");
            container.innerText = msg;
            
            // 附著在 App 容器內，保證行動端完美對齊
            document.querySelector('.app-container').appendChild(container);
            setTimeout(() => {
                container.classList.add('opacity-0');
                setTimeout(() => container.remove(), 300);
            }, 2500);
        }

        // --- 地圖 APP / 網頁深度路由喚醒 ---
        window.openMapsApp = function(event, query, fallbackUrl) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            if (!query && !fallbackUrl) return;

            const encodedQuery = encodeURIComponent(query);
            // iOS 專屬 Google Maps App 協議
            const iosGoogleMapsUrl = `comgooglemaps://?q=${encodedQuery}`;
            const fallback = fallbackUrl || `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

            // 判斷是否為 iOS 設備 (iPhone/iPad/iPod 或觸控 Mac)
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            if (isIOS) {
                // 優先調用 iOS App 協議
                window.location.href = iosGoogleMapsUrl;

                // 若 800 毫秒內 focus 還留在原網頁，則 Fallback 彈出新視窗開啟網頁版
                const start = Date.now();
                setTimeout(() => {
                    if (Date.now() - start < 1500 && document.visibilityState === 'visible') {
                        window.open(fallback, '_blank');
                    }
                }, 800);
            } else {
                // Android 系統與桌面端會自動引導
                window.open(fallback, '_blank');
            }
        };

        // 匯率常數 (1 JPY = 0.052 MOP)
        const JPY_TO_MOP = 0.052;

        // 初始化記帳儲存區 (預設)
        let localExpenses = [
            { id: 1, title: '一鶴骨付鳥晚餐', jpy: 8500, category: '餐飲', day: 'Day 1' },
            { id: 2, title: '小豆島渡輪費用', jpy: 6800, category: '交通', day: 'Day 3' },
            { id: 3, title: '道後溫泉土產', jpy: 4200, category: '購物', day: 'Day 5' }
        ];

        // 動態憑證資料庫 (預設)
        let localVouchers = [
            { 
                id: 1, 
                category: "小豆島渡輪預約號", 
                time: "7/26 (週日)", 
                code: "0407270902", 
                image: "https://i.ibb.co/gF3gbVXv/takamatsuship.webp",
                content: "高松港往返小豆島土庄港汽車渡輪預約。必須於開航前 40 分鐘抵達售票處辦理車輛乘船登記。"
            },
            { 
                id: 2, 
                category: "去程航班託運憑證", 
                time: "7/24 (週五)", 
                code: "UO 642", 
                image: "https://i.ibb.co/7NJ7ww9N/27-HKExpress-2.jpg",
                content: "<b>去程行李政策細則 ✈️</b><br>• 託運行李：3人合共 2 件，總上限 20 kg。<br>• 隨身物品：3人合共 3 件（需符合航空公司隨身包限額尺寸）。"
            },

        // --- 本地持久化資料庫綁定 (LocalStorage 核心) ---
        let localDays = [];
        
        function initLocalDatabase() {
            const cachedDays = localStorage.getItem('shikoku_local_days');
            const cachedExpenses = localStorage.getItem('shikoku_local_expenses');
            const cachedVouchers = localStorage.getItem('shikoku_local_vouchers');

            if (cachedDays) {
                localDays = JSON.parse(cachedDays);
            } else {
                localDays = JSON.parse(JSON.stringify(shikokuDb.days));
            }

            if (cachedExpenses) {
                localExpenses = JSON.parse(cachedExpenses);
            }
            if (cachedVouchers) {
                localVouchers = JSON.parse(cachedVouchers);
            }

            // 檢查 URL 參數中是否有家人分享過來的同步壓縮碼
            const urlParams = new URLSearchParams(window.location.search);
            const syncData = urlParams.get('sync');
            if (syncData) {
                setTimeout(() => {
                    document.getElementById('import-modal').classList.remove('hidden');
                }, 1200);
            }
        }

        function saveAllToLocalStorage() {
            localStorage.setItem('shikoku_local_days', JSON.stringify(localDays));
            localStorage.setItem('shikoku_local_expenses', JSON.stringify(localExpenses));
            localStorage.setItem('shikoku_local_vouchers', JSON.stringify(localVouchers));
        }

        // --- 密碼驗證解鎖開屏閘道 ---
        function verifyPasscode() {
            const input = document.getElementById('splash-passcode').value;
            if (input === '371990') {
                localStorage.setItem('shikoku_pass_verified', 'true');
                dismissSplash();
            } else {
                showNotification('密碼錯誤！請重新輸入。', 'error');
                document.getElementById('splash-passcode').value = '';
            }
        }

        function dismissSplash() {
            const splash = document.getElementById('splash-screen');
            const appLayout = document.getElementById('main-app-layout');
            
            splash.classList.add('opacity-0', 'scale-105');
            appLayout.classList.remove('hidden');
            appLayout.classList.add('animate-fade-in');
            
            setTimeout(() => {
                splash.style.display = 'none';
                splash.classList.remove('pointer-events-auto');
                splash.classList.add('pointer-events-none');
            }, 700);

            switchTab('overview');
        }

        // --- 智慧差異化 URL 壓縮打包分享 (Delta-Sharing 協定) ---
        function generateShareLink() {
            // 智慧對比：只將新增、修改過的行程、以及用戶在本地新增的憑證與帳目打包，避免網址超長！
            const deltaPayload = {
                expenses: localExpenses,
                vouchers: localVouchers,
                days: localDays.map(d => ({
                    day: d.day,
                    slots: d.slots.filter(s => s.isCustom || s.isEdited)
                })).filter(d => d.slots.length > 0)
            };

            const jsonStr = JSON.stringify(deltaPayload);
            // 快速 Base64 安全轉碼
            const compressedB64 = btoa(unescape(encodeURIComponent(jsonStr)));
            
            const shareUrl = window.location.origin + window.location.pathname + "?sync=" + compressedB64;
            
            const shareTextarea = document.getElementById('share-url-text');
            shareTextarea.value = shareUrl;
            document.getElementById('share-modal').classList.remove('hidden');
        }

        function copyGeneratedLink() {
            const shareTextarea = document.getElementById('share-url-text');
            shareTextarea.select();
            shareTextarea.setSelectionRange(0, 99999); // 行動端優化相容

            try {
                document.execCommand('copy');
                showNotification('✨ 複製成功！快去傳給家人群組吧。');
                closeShareModal();
            } catch (err) {
                showNotification('複製失敗，請手動全選複製。', 'error');
            }
        }

        // 接收家人的同步連結
        function acceptImport() {
            const urlParams = new URLSearchParams(window.location.search);
            const syncData = urlParams.get('sync');
            
            if (syncData) {
                try {
                    const decodedJson = decodeURIComponent(escape(atob(syncData)));
                    const importedPayload = JSON.parse(decodedJson);

                    if (importedPayload.expenses) localExpenses = importedPayload.expenses;
                    if (importedPayload.vouchers) localVouchers = importedPayload.vouchers;
                    
                    // 無縫合併行程
                    if (importedPayload.days) {
                        // 恢復預設值
                        localDays = JSON.parse(JSON.stringify(shikokuDb.days));
                        importedPayload.days.forEach(impDay => {
                            const targetDay = localDays.find(d => d.day === impDay.day);
                            if (targetDay) {
                                // 將修改過的槽位塞回正確位置，並加入自定義槽位
                                impDay.slots.forEach(impSlot => {
                                    if (impSlot.isCustom) {
                                        targetDay.slots.push(impSlot);
                                    } else if (impSlot.isEdited) {
                                        // 替換原本的
                                        const origIdx = targetDay.slots.findIndex(s => s.time === impSlot.origTime || s.title === impSlot.origTitle);
                                        if (origIdx !== -1) {
                                            targetDay.slots[origIdx] = impSlot;
                                        }
                                    }
                                });
                            }
                        });
                    }

                    saveAllToLocalStorage();
                    showNotification('📥 同步匯入成功！數據已完美儲存。');
                } catch (e) {
                    showNotification('數據解碼失敗，請重新生成連結。', 'error');
                }
            }
            rejectImport(); // 關閉彈窗
            switchTab('overview');
        }

        function rejectImport() {
            document.getElementById('import-modal').classList.add('hidden');
            // 清理 URL 保持乾淨
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        function closeShareModal() {
            document.getElementById('share-modal').classList.add('hidden');
        }

        // --- 導覽切換頁面控制 ---

            const buttons = document.querySelectorAll('nav button');
            buttons.forEach(btn => btn.className = "flex flex-col items-center gap-1 text-slate-400 transition-colors");
            
            const activeBtn = document.getElementById(`nav-${tabId}`);
            if (activeBtn) {
                activeBtn.className = "flex flex-col items-center gap-1 text-[#1A303A] active-tab transition-colors";
            }

            const viewport = document.getElementById('app-viewport');
            
            if (tabId === 'overview') {
                renderOverview(viewport);
            } else if (tabId === 'itinerary') {
                renderItinerary(viewport);
            } else if (tabId === 'vouchers') {
                renderVouchers(viewport);
            } else if (tabId === 'wallet') {
                renderWallet(viewport);
            } else if (tabId === 'emergency') {
                renderEmergency(viewport);
            }
            
            viewport.scrollTop = 0;
            // 全局渲染 LaTeX 數學符號
            if (window.renderMathInElement) {
                renderMathInElement(viewport);
            }
        }

        // 天氣預報實時抓取
        async function fetchWeather() {
            const currentDayObj = shikokuDb.days.find(d => d.day === currentDayFilter);
            if (!currentDayObj) return;

            const locKey = currentDayObj.location;
            const coord = weatherCoords[locKey];
            if (!coord) return;

            const cityLabel = document.getElementById('weather-city');
            const tempLabel = document.getElementById('weather-temp');
            const descLabel = document.getElementById('weather-desc');
            const windLabel = document.getElementById('weather-wind');

            cityLabel.innerText = `${coord.name}市`;

            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lon}&current_weather=true`);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                const wind = data.current_weather.windspeed;

                tempLabel.innerText = `${temp}°C`;
                windLabel.innerText = `風速: ${wind} km/h`;

                let weatherText = "☀️ 盛夏晴朗";
                if (code > 0 && code <= 3) weatherText = "🌤️ 多雲偏晴";
                else if (code >= 45 && code <= 48) weatherText = "🌫️ 局部有霧";
                else if (code >= 51 && code <= 67) weatherText = "🌧️ 局部細雨";
                else if (code >= 71 && code <= 82) weatherText = "🌦️ 短暫陣雨";

                descLabel.innerText = weatherText;

            } catch (err) {
                tempLabel.innerText = "29°C";
                descLabel.innerText = "☀️ 盛夏晴朗 (歷史統計平均)";
                windLabel.innerText = "風速: 8.5 km/h";
            }
        }

        // --- 6. 點擊詳情彈窗功能 (置中顯示修正) ---
        function openDetailModal(dayNum, slotIndex) {
            const dayData = localDays.find(d => d.day === dayNum);
            if (!dayData) return;

            const slot = dayData.slots[slotIndex];
            if (!slot) return;
            if (slot.driveTime) return;

            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');

            content.innerHTML = `
                <div class="space-y-1">
                    <div class="flex items-center gap-1.5">
                        <span class="text-[9px] font-black text-blue-900 bg-blue-50 px-2 py-0.5 rounded">${slot.category}</span>
                        <span class="text-[9px] text-slate-400">${slot.time}</span>
                    </div>
                    <h3 class="text-sm font-black text-slate-900 leading-tight">${slot.title}</h3>
                </div>

                ${slot.image ? `
                <div class="h-28 rounded-xl overflow-hidden bg-slate-100 border border-slate-200 relative">
                    <img src="${slot.image}" class="w-full h-full object-cover" alt="${slot.title}" onerror="this.src='https://placehold.co/400x300/FAF8F5/1A303A?text=Shikoku'">
                </div>` : ''}

                <div class="space-y-1">
                    <h4 class="text-[9px] font-black tracking-widest text-slate-400 uppercase">活動詳情</h4>
                    <p class="text-xs text-slate-600 leading-normal font-normal">${slot.desc}</p>
                </div>

                <div class="bg-amber-50 border border-amber-200 p-2.5 rounded-xl space-y-1">
                    <div class="text-[9px] font-black text-amber-800 flex items-center gap-1.5">
                        <i class="fa-solid fa-compass"></i> MIO MIO 導遊隨行攻略與必買必吃
                    </div>
                    <p class="text-[9px] text-slate-700 leading-relaxed font-normal">${slot.tips}</p>
                </div>

                <div class="grid grid-cols-2 gap-2.5 pt-1">
                    <div class="p-2 bg-slate-50 border border-slate-200 rounded-lg text-center">
                        <span class="text-[8px] text-slate-400 font-bold uppercase block">車機導航代碼</span>
                        <span class="text-xs font-black text-slate-800">${slot.mapcode}</span>
                    </div>
                    ${slot.gmaps ? `
                        <button onclick="openMapsApp(event, '${slot.title}', '${slot.gmaps}')" class="p-2 bg-[#1A303A] text-white rounded-lg text-center font-black text-xs flex items-center justify-center gap-1.5 shadow-md">
                            <i class="fa-solid fa-map text-[9px]"></i> 開啟地圖
                        </button>
                    ` : `
                        <div class="p-2 bg-slate-100 text-slate-300 rounded-lg text-center font-black text-xs flex items-center justify-center">
                            無須導航
                        </div>
                    `}
                </div>
            `;

            modal.classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        // --- 行程新增與編輯功能 ---
        function openAddEventModal(dayNum) {
            document.getElementById('new-event-day').value = dayNum;
            document.getElementById('new-event-index').value = ""; // 標示為新增
            
            document.getElementById('add-event-modal-title').innerText = "新增自定義行程";
            document.getElementById('new-event-title').value = "";
            document.getElementById('new-event-time').value = "";
            document.getElementById('new-event-cat').value = "景點";
            document.getElementById('new-event-img').value = "";
            document.getElementById('new-event-desc').value = "";
            document.getElementById('new-event-gmaps').value = "";
            document.getElementById('new-event-mapcode').value = "";

            document.getElementById('add-event-modal').classList.remove('hidden');
        }

        function openEditEventModal(dayNum, index, event) {
            if (event) event.stopPropagation();

            const dayObj = localDays.find(d => d.day === dayNum);
            if (!dayObj) return;
            const slot = dayObj.slots[index];
            if (!slot) return;

            document.getElementById('new-event-day').value = dayNum;
            document.getElementById('new-event-index').value = index;

            document.getElementById('add-event-modal-title').innerText = "編輯行程時段";
            document.getElementById('new-event-title').value = slot.title;
            document.getElementById('new-event-time').value = slot.time;
            document.getElementById('new-event-cat').value = slot.category;
            document.getElementById('new-event-img').value = slot.image || "";
            document.getElementById('new-event-desc').value = slot.desc;
            document.getElementById('new-event-gmaps').value = slot.gmaps || "";
            document.getElementById('new-event-mapcode').value = slot.mapcode || "";

            document.getElementById('add-event-modal').classList.remove('hidden');
        }

        function submitNewEvent() {
            const dayNum = parseInt(document.getElementById('new-event-day').value, 10);
            const indexVal = document.getElementById('new-event-index').value;

            const title = document.getElementById('new-event-title').value;
            const time = document.getElementById('new-event-time').value;
            const cat = document.getElementById('new-event-cat').value;
            const img = document.getElementById('new-event-img').value;
            const desc = document.getElementById('new-event-desc').value;
            const gmaps = document.getElementById('new-event-gmaps').value;
            const mapcode = document.getElementById('new-event-mapcode').value;

            if (!title || !time) {
                showNotification('請完整填寫項目標題與時間段。', 'error');
                return;
            }

            const dayObj = localDays.find(d => d.day === dayNum);
            if (!dayObj) return;

            const eventData = {
                time: time,
                title: title,
                category: cat,
                image: img,
                desc: desc,
                gmaps: gmaps,
                mapcode: mapcode || "無障礙通道",
                walk: "低",
                toilet: "便利",
                temp: "舒適",
                tips: "✨ 用戶手動新增/編輯之行程。"
            };

            if (indexVal === "") {
                // 新增
                eventData.isCustom = true;
                dayObj.slots.push(eventData);
                showNotification('➕ 日程項目新增成功！');
            } else {
                // 編輯
                const idx = parseInt(indexVal, 10);
                const orig = dayObj.slots[idx];
                eventData.isEdited = true;
                eventData.origTime = orig.origTime || orig.time;
                eventData.origTitle = orig.origTitle || orig.title;
                dayObj.slots[idx] = eventData;
                showNotification('✏️ 日程修改成功！');
            }

            saveAllToLocalStorage();
            closeAddEventModal();
            renderItinerary(document.getElementById('app-viewport'));
        }

        function deleteSlot(dayNum, index, event) {
            if (event) event.stopPropagation();
            const dayObj = localDays.find(d => d.day === dayNum);
            if (!dayObj) return;

            dayObj.slots.splice(index, 1);
            saveAllToLocalStorage();
            renderItinerary(document.getElementById('app-viewport'));
            showNotification('🗑️ 行程項目已刪除。');
        }

        function closeAddEventModal() {
            document.getElementById('add-event-modal').classList.add('hidden');
        }

        // --- 憑證新增與編輯功能 ---
        function openAddVoucherModal() {
            document.getElementById('voucher-id').value = "";
            document.getElementById('voucher-modal-title').innerText = "新增預約憑證";
            document.getElementById('voucher-title').value = "";
            document.getElementById('voucher-time').value = "";
            document.getElementById('voucher-code').value = "";
            document.getElementById('voucher-img').value = "";
            document.getElementById('voucher-desc').value = "";

            document.getElementById('add-voucher-modal').classList.remove('hidden');
        }

        function openEditVoucherModal(index) {
            const v = localVouchers[index];
            if (!v) return;

            document.getElementById('voucher-id').value = index;
            document.getElementById('voucher-modal-title').innerText = "編輯預約憑證";
            document.getElementById('voucher-title').value = v.category;
            document.getElementById('voucher-time').value = v.time;
            document.getElementById('voucher-code').value = v.code;
            document.getElementById('voucher-img').value = v.image || "";
            document.getElementById('voucher-desc').value = v.content;

            document.getElementById('add-voucher-modal').classList.remove('hidden');
        }

        function submitVoucher() {
            const idVal = document.getElementById('voucher-id').value;
            const title = document.getElementById('voucher-title').value;
            const time = document.getElementById('voucher-time').value;
            const code = document.getElementById('voucher-code').value;
            const img = document.getElementById('voucher-img').value;
            const desc = document.getElementById('voucher-desc').value;

            if (!title || !time || !code) {
                showNotification('請完整填寫項目、時間與憑證代碼。', 'error');
                return;
            }

            const data = {
                category: title,
                time: time,
                code: code,
                image: img,
                content: desc
            };

            if (idVal === "") {
                data.id = Date.now();
                localVouchers.push(data);
                showNotification('➕ 預約憑證已成功保存！');
            } else {
                const idx = parseInt(idVal, 10);
                localVouchers[idx] = data;
                showNotification('✏️ 憑證修改已成功保存！');
            }

            saveAllToLocalStorage();
            closeAddVoucherModal();
            renderVouchers(document.getElementById('app-viewport'));
        }

        function deleteVoucher(idx) {
            localVouchers.splice(idx, 1);
            saveAllToLocalStorage();
            renderVouchers(document.getElementById('app-viewport'));
            showNotification('🗑️ 憑證已成功刪除。');
        }

        function closeAddVoucherModal() {
            document.getElementById('add-voucher-modal').classList.add('hidden');
        }

        // --- 初始化啟動引導 ---
        window.onload = function() {
            initLocalDatabase();
            
            // 檢查本地是否已經解鎖過
            const passVerified = localStorage.getItem('shikoku_pass_verified');
            if (passVerified === 'true') {
                dismissSplash();
            }
        };
    </script>
