<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>shikoku2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Noto Sans TC & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;950&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- KaTeX 數學公式渲染 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

    <style>
        body {
            font-family: 'Noto Sans TC', 'Hiragino Kaku Gothic ProN', 'PingFang TC', sans-serif;
            background-color: #1A303A; /* 桌端背景深邃海藍 */
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .serif-title {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
        }
        .active-tab {
            color: #1A303A; 
            font-weight: 950;
        }
        /* 隱藏原生滾動條，保持文青整潔 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 原生 App 容器樣式 */
        .app-container {
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background-color: #FAF8F5; /* 文青暖砂紙色 */
            overflow: hidden;
            position: relative;
        }
        .hand-card {
            border: 1px solid #E2DCD5;
            box-shadow: 0 4px 12px rgba(26, 48, 58, 0.03);
            background-color: #FFFFFF;
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-zoom-in {
            animation: zoomIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen">

    <!-- 桌面端自動縮減為 Phone Frame，手機端自動滿版 -->
    <div class="app-container max-w-md shadow-2xl">

        <!-- 1. 開屏手繪海邊故事頁 (Splash Screen + 密碼鎖保護閘) -->
        <div id="splash-screen" class="absolute inset-0 z-50 bg-cover bg-center flex flex-col items-center justify-start transition-all duration-700 pointer-events-auto" style="background-image: url('https://i.ibb.co/sdjvQZXK/05a5e65565cd1919a84950206637bfd3.jpg');">
            <!-- 上方 1/3 的黃金按鈕與輸入框位置 -->
            <div class="mt-[28vh] flex flex-col items-center gap-3.5 w-[280px] p-6 rounded-3xl bg-white/70 backdrop-blur-md shadow-[0_12px_40px_rgba(26,48,58,0.15)] border border-white/30 text-center animate-zoom-in">
                <div class="space-y-1">
                    <span class="text-xs font-black tracking-[0.2em] text-[#1A303A] uppercase block">SHIKOKU 2026</span>
                    <span class="text-[10px] font-bold text-slate-500 block">請輸入 6 位數專屬密碼解鎖行程</span>
                </div>
                
                <!-- 密碼輸入框 -->
                <input id="splash-passcode" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="請輸入密碼" class="w-full py-3.5 text-center text-xl tracking-[0.5em] font-black rounded-2xl bg-white/90 border border-[#E2DCD5] focus:outline-none focus:ring-2 focus:ring-[#1A303A] text-[#1A303A] placeholder:tracking-normal placeholder:text-xs">
                
                <button onclick="verifyPasscode()" class="w-full py-3.5 bg-[#1A303A] hover:bg-slate-800 text-white font-extrabold text-sm tracking-widest rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.1)] flex items-center justify-center gap-2 transition-transform active:scale-95 duration-200">
                    <i class="fa-solid fa-key text-orange-400"></i>
                    <span>驗證密碼並開啟</span>
                </button>
            </div>
        </div>

        <!-- 2. 固定頂部導航列 (Header) -->
        <header class="flex-none bg-white border-b border-[#E2DCD5] px-5 py-4 z-30">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="serif-title text-2xl font-black tracking-widest text-[#1A303A]">shikoku2026</h1>
                    <span class="text-[10px] font-bold text-slate-400 tracking-wider mt-0.5">四國2026自駕遊</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-black text-amber-600 bg-amber-50 border border-amber-100 px-2 py-0.5 rounded-md">MIO MIO 專屬</span>
                    <span class="text-[9px] text-slate-400 font-bold mt-1">2026.07.24 - 07.30</span>
                </div>
            </div>
        </header>

        <!-- 3. 可上下滾動的中間內容視窗 -->
        <main class="flex-1 overflow-y-auto no-scrollbar px-4 py-5 space-y-6" id="app-viewport">
            <!-- JS 動態注入頁面內容 -->
        </main>

        <!-- 4. 固定底部懸浮導航列 (Tab Bar) -->
        <nav class="flex-none bg-white border-t border-[#E2DCD5] shadow-[0_-5px_30px_rgba(0,0,0,0.03)] py-3 z-30">
            <div class="flex justify-around items-center">
                <button onclick="switchTab('overview')" id="nav-overview" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
                    <i class="fa-solid fa-compass text-lg"></i>
                    <span class="text-[10px] font-bold">概覽</span>
                </button>
                <button onclick="switchTab('itinerary')" id="nav-itinerary" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
                    <i class="fa-solid fa-map-location-dot text-lg"></i>
                    <span class="text-[10px] font-bold">行程</span>
                </button>
                <button onclick="switchTab('vouchers')" id="nav-vouchers" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
                    <i class="fa-solid fa-passport text-lg"></i>
                    <span class="text-[10px] font-bold">憑證</span>
                </button>
                <button onclick="switchTab('wallet')" id="nav-wallet" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
                    <i class="fa-solid fa-wallet text-lg"></i>
                    <span class="text-[10px] font-bold">記帳</span>
                </button>
                <button onclick="switchTab('emergency')" id="nav-emergency" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
                    <i class="fa-solid fa-life-ring text-lg"></i>
                    <span class="text-[10px] font-bold">應急</span>
                </button>
            </div>
        </nav>

        <!-- 5. 彈出式詳情卡片 (置中彈窗對齊畫面中間) -->
        <div id="detail-modal" class="absolute inset-0 z-50 bg-[#1A303A]/60 backdrop-blur-sm hidden flex items-center justify-center p-4" onclick="closeDetailModal()">
            <div class="bg-white w-full max-w-[90%] rounded-[24px] p-6 space-y-4 animate-zoom-in max-h-[80vh] overflow-y-auto no-scrollbar shadow-2xl border border-slate-100" onclick="event.stopPropagation()">
                <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-2" onclick="closeDetailModal()"></div>
                <div id="modal-content" class="space-y-4">
                    <!-- 詳情內容動態渲染 -->
                </div>
                <button onclick="closeDetailModal()" class="w-full py-3 bg-[#1A303A] text-white font-extrabold rounded-2xl shadow-lg hover:bg-slate-800 transition text-sm">關閉詳情</button>
            </div>
        </div>

        <!-- 📥 發現分享數據的雲端匯入提示彈出視窗 -->
        <div id="import-modal" class="absolute inset-0 z-[60] bg-[#1A303A]/70 backdrop-blur-sm hidden flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-[90%] rounded-3xl p-6 space-y-5 animate-zoom-in shadow-2xl">
                <div class="text-center space-y-2">
                    <div class="w-16 h-16 bg-blue-50 text-blue-900 rounded-full flex items-center justify-center text-3xl mx-auto">
                        <i class="fa-solid fa-cloud-arrow-down animate-bounce text-orange-400"></i>
                    </div>
                    <h3 class="text-xl font-black text-[#1A303A]">載入家人分享的新行程？</h3>
                    <p class="text-xs text-slate-500 leading-relaxed">
                        系統偵測到一組由家人同步分享的最新行程數據。確認匯入將會覆蓋您此台手機上目前的本地紀錄。
                    </p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="rejectImport()" class="py-3 bg-slate-100 text-slate-600 font-bold rounded-xl text-xs">維持現狀</button>
                    <button onclick="acceptImport()" class="py-3 bg-[#1A303A] text-white font-bold rounded-xl text-xs">確認匯入並同步</button>
                </div>
            </div>
        </div>

        <!-- 🔗 分享網址複製彈出視窗 -->
        <div id="share-modal" class="absolute inset-0 z-50 bg-[#1A303A]/60 backdrop-blur-sm hidden flex items-center justify-center p-4" onclick="closeShareModal()">
            <div class="bg-white w-full max-w-[90%] rounded-[24px] p-6 space-y-4 animate-zoom-in shadow-2xl" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                    <h3 class="text-lg font-black text-[#1A303A] flex items-center gap-2">
                        <i class="fa-solid fa-share-nodes text-orange-400"></i> 分享同步網址
                    </h3>
                    <button onclick="closeShareModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div class="space-y-3">
                    <p class="text-xs text-slate-500 leading-relaxed">
                        複製下方連結並傳送到微信、WhatsApp 或 LINE 家族群組。家人點開即可在他們的手機上同步更新您新修改的所有行程！
                    </p>
                    <textarea id="share-url-text" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs h-24 focus:outline-[#1A303A] resize-none" readonly></textarea>
                </div>
                <div class="grid grid-cols-1 pt-2">
                    <button onclick="copyGeneratedLink()" class="py-3 bg-[#1A303A] text-white font-bold rounded-xl text-sm shadow-md flex items-center justify-center gap-2">
                        <i class="fa-solid fa-copy"></i> 一鍵複製分享連結
                    </button>
                </div>
            </div>
        </div>

        <!-- 3. 新增/編輯自定義行程彈出視窗 -->
        <div id="add-event-modal" class="absolute inset-0 z-50 bg-[#1A303A]/60 backdrop-blur-sm hidden flex items-center justify-center p-4" onclick="closeAddEventModal()">
            <div class="bg-white w-full max-w-[90%] rounded-[24px] p-6 space-y-4 animate-zoom-in shadow-2xl" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                    <h3 id="add-event-modal-title" class="text-lg font-black text-[#1A303A] flex items-center gap-2">
                        <i class="fa-solid fa-calendar-plus text-orange-400"></i> 新增自定義行程
                    </h3>
                    <button onclick="closeAddEventModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div class="space-y-3 max-h-[50vh] overflow-y-auto no-scrollbar pr-1">
                    <input type="hidden" id="new-event-day">
                    <input type="hidden" id="new-event-index">
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">行程標題 *</label>
                        <input id="new-event-title" type="text" placeholder="例如: 瓦町星巴克咖啡館" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">時間區間 *</label>
                            <input id="new-event-time" type="text" placeholder="例如: 15:00 - 16:00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">行程種類 *</label>
                            <select id="new-event-cat" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A] font-bold">
                                <option value="景點">景點 📸</option>
                                <option value="餐飲">餐飲 🍽️</option>
                                <option value="交通">交通 🚗</option>
                                <option value="住宿">住宿 🏨</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">圖片網址 (可選)</label>
                        <input id="new-event-img" type="text" placeholder="https://..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">行程詳細介紹與備註</label>
                        <textarea id="new-event-desc" placeholder="請填寫本景點的特色..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm h-20 resize-none focus:outline-[#1A303A]"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">Google Maps 連結</label>
                            <input id="new-event-gmaps" type="text" placeholder="https://..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">車載 Mapcode</label>
                            <input id="new-event-mapcode" type="text" placeholder="例如: 60 607 721*12" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-100">
                    <button onclick="closeAddEventModal()" class="py-3 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">取消</button>
                    <button onclick="submitNewEvent()" class="py-3 bg-[#1A303A] text-white font-bold rounded-xl text-sm">儲存日程</button>
                </div>
            </div>
        </div>

        <!-- 4. 新增/編輯預約憑證彈出視窗 -->
        <div id="add-voucher-modal" class="absolute inset-0 z-50 bg-[#1A303A]/60 backdrop-blur-sm hidden flex items-center justify-center p-4" onclick="closeAddVoucherModal()">
            <div class="bg-white w-full max-w-[90%] rounded-[24px] p-6 space-y-4 animate-zoom-in shadow-2xl" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                    <h3 id="voucher-modal-title" class="text-lg font-black text-[#1A303A] flex items-center gap-2">
                        <i class="fa-solid fa-file-signature text-orange-400"></i> 新增預約憑證
                    </h3>
                    <button onclick="closeAddVoucherModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div class="space-y-3 max-h-[50vh] overflow-y-auto no-scrollbar pr-1">
                    <input type="hidden" id="voucher-id">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">憑證項目標題 *</label>
                        <input id="voucher-title" type="text" placeholder="例如: 小豆島渡輪預約號" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">時間區間或天數 *</label>
                            <input id="voucher-time" type="text" placeholder="例如: 7/26 (週日)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1">預約憑證代碼 *</label>
                            <input id="voucher-code" type="text" placeholder="例如: 0407270902" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">憑證圖片網址 (可選)</label>
                        <input id="voucher-img" type="text" placeholder="https://..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-[#1A303A]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">憑證詳細備註</label>
                        <textarea id="voucher-desc" placeholder="請填寫憑證的使用說明..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm h-20 resize-none focus:outline-[#1A303A]"></textarea>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-100">
                    <button onclick="closeAddVoucherModal()" class="py-3 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">取消</button>
                    <button onclick="submitVoucher()" class="py-3 bg-[#1A303A] text-white font-bold rounded-xl text-sm">儲存憑證</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 烤吐司通知卡片 (替代阻斷性的 alert) ---
        function showNotification(msg, type = "info") {
            const container = document.createElement('div');
            container.className = "absolute bottom-24 left-1/2 -translate-x-1/2 z-[99] px-6 py-3 rounded-2xl text-xs font-bold text-white shadow-xl animate-zoom-in transition-opacity duration-300 " + 
                (type === "error" ? "bg-red-500" : "bg-[#1A303A]");
            container.innerText = msg;
            
            // 附著在 App 容器內，保證行動端完美對齊
            document.querySelector('.app-container').appendChild(container);
            setTimeout(() => {
                container.classList.add('opacity-0');
                setTimeout(() => container.remove(), 300);
            }, 2500);
        }

        // 匯率常數 (1 JPY = 0.052 MOP)
        const JPY_TO_MOP = 0.052;

        // 初始化記帳儲存區
        let localExpenses = [
            { id: 1, title: '一鶴骨付鳥晚餐', jpy: 8500, category: '餐飲', day: 'Day 1' },
            { id: 2, title: '小豆島渡輪費用', jpy: 6800, category: '交通', day: 'Day 3' },
            { id: 3, title: '道後溫泉土產', jpy: 4200, category: '購物', day: 'Day 5' }
        ];

        // 動態憑證資料庫
        let localVouchers = [
            { 
                id: 1, 
                category: "小豆島渡輪預約號", 
                time: "7/26 (週日)", 
                code: "0407270902", 
                image: "https://i.ibb.co/gF3gbVXv/takamatsuship.webp",
                content: "高松港往返小豆島土庄港汽車渡輪預約。必須於開航前 40 分鐘抵達售票處辦理車輛乘船登記。"
            },
            { 
                id: 2, 
                category: "去程航班託運憑證", 
                time: "7/24 (週五)", 
                code: "UO 642", 
                image: "https://i.ibb.co/7NJ7ww9N/27-HKExpress-2.jpg",
                content: "<b>去程行李政策細則 ✈️</b><br>• 託運行李：3人合共 2 件，總上限 20 kg。<br>• 隨身物品：3人合共 3 件（需符合航空公司隨身包限額尺寸）。"
            },
            { 
                id: 3, 
                category: "回程航班託運憑證", 
                time: "7/30 (週四)", 
                code: "UO 643", 
                image: "https://i.ibb.co/7NJ7ww9N/27-HKExpress-2.jpg",
                content: "<b>回程行李政策細則 ✈️</b><br>• 託運行李：3人合共 2 件，總上限 20 kg。<br>• 隨身物品：3人合共 3 件。<br>• 登機行李：3人合共 3 件（每件小於 7 kg）。"
            },
            { 
                id: 4, 
                category: "ETC 卡取用註冊", 
                time: "7/24 (週五)", 
                code: "臨櫃取借結算", 
                image: "https://i.ibb.co/spwX63nk/26-car.jpg",
                content: "辦理租車手續時，必須向櫃檯申請加購租用車載 ETC 卡。自駕回程時在租車櫃檯依過路費記錄實報實銷。"
            }
        ];

        // 天氣座標
        const weatherCoords = {
            'Takamatsu': { lat: 34.34, lon: 134.05, name: '高松' },
            'Tokushima': { lat: 34.07, lon: 134.55, name: '德島' },
            'Shodoshima': { lat: 34.48, lon: 134.25, name: '小豆島' },
            'Matsuyama': { lat: 33.84, lon: 132.76, name: '松山 / 今治' }
        };

        let currentDayFilter = 1;

        // 解除開屏畫面與密碼驗證
        function verifyPasscode() {

                            tips: "<b>安全歸家 ✈️：</b><br>• <b>💡 出境提醒：</b> 還車油單收據請留給櫃台核對。入關後可在機場免稅店作最後採購，滿載而歸！"

                    ]
                }
            ]
        };

        // --- 核心頁面隱藏/防漏載判定與本地儲存模組 ---
        let localDays = [];

        // --- URL安全之編解碼模組 (支援 Gzip & Base64) ---
        function encodeData(dataObj) {
            const jsonStr = JSON.stringify(dataObj);
            return btoa(unescape(encodeURIComponent(jsonStr)));
        }

        function decodeData(base64Str) {
            const jsonStr = decodeURIComponent(escape(atob(base64Str)));
            return JSON.parse(jsonStr);
        }

        // 載入本地 LocalStorage 數據
        function loadAllData() {
            // 先檢查 URL 是否含有家人分享的數據
            const urlParams = new URLSearchParams(window.location.search);
            const tripData = urlParams.get('trip');
            if (tripData) {
                try {
                    // 暫存於全域，待使用者確認是否覆蓋
                    window.pendingTripData = tripData;
                } catch (e) {
                    console.error("解析分享代碼出錯", e);
                }
            }

            const storedDays = localStorage.getItem('shikoku_days_v1');
            const storedExpenses = localStorage.getItem('shikoku_expenses_v1');
            const storedVouchers = localStorage.getItem('shikoku_vouchers_v1');

            if (storedDays) {
                localDays = JSON.parse(storedDays);
            } else {
                localDays = JSON.parse(JSON.stringify(shikokuDb.days));
            }

            if (storedExpenses) {
                localExpenses = JSON.parse(storedExpenses);
            }

            if (storedVouchers) {
                localVouchers = JSON.parse(storedVouchers);
            }
        }

        // 保存目前所有狀態至 LocalStorage
        function saveAllToStorage() {
            localStorage.setItem('shikoku_days_v1', JSON.stringify(localDays));
            localStorage.setItem('shikoku_expenses_v1', JSON.stringify(localExpenses));
            localStorage.setItem('shikoku_vouchers_v1', JSON.stringify(localVouchers));
        }

        // 家人分享網址匯入確認
        function acceptImport() {
            try {
                const importedData = decodeData(window.pendingTripData);
                if (importedData.days && importedData.expenses && importedData.vouchers) {
                    // 若有自定義行程則覆蓋
                    if (importedData.days !== "DEFAULT") {
                        localDays = importedData.days;
                    } else {
                        localDays = JSON.parse(JSON.stringify(shikokuDb.days));
                    }
                    localExpenses = importedData.expenses;
                    localVouchers = importedData.vouchers;
                    saveAllToStorage();
                    showNotification("📥 成功載入家人同步的最新自駕行程！");
                    setTimeout(() => {
                        window.location.href = window.location.origin + window.location.pathname;
                    }, 1200);
                } else {
                    showNotification("數據解析異常，格式不符", "error");
                }
            } catch (e) {
                showNotification("載入失敗，代碼可能不完整", "error");
            }
        }

        function rejectImport() {
            document.getElementById('import-modal').classList.add('hidden');
            // 清理 URL 保持乾淨
            window.history.replaceState({}, document.title, window.location.pathname);
            showNotification("已維持本地目前的日程紀錄。");
        }

        // 產生同步分享連結 (精簡型)
        window.generateShareLink = function() {
            const defaultDaysStr = JSON.stringify(shikokuDb.days);
            const currentDaysStr = JSON.stringify(localDays);
            
            const packageData = {
                expenses: localExpenses,
                vouchers: localVouchers
            };

            // 若使用者沒有新增/刪除修改過主體景點，打包時忽略 days 以大幅縮短網址長度 (智慧 Delta 模式)
            if (defaultDaysStr !== currentDaysStr) {
                packageData.days = localDays;
            } else {
                packageData.days = "DEFAULT";
            }

            try {
                const encoded = encodeData(packageData);
                const shareUrl = window.location.origin + window.location.pathname + "?trip=" + encoded;
                document.getElementById('share-url-text').value = shareUrl;
                document.getElementById('share-modal').classList.remove('hidden');
            } catch(e) {
                showNotification("加密同步代碼失敗", "error");
            }
        };

            document.getElementById('share-modal').classList.add('hidden');
        };

        window.copyGeneratedLink = function() {
            const urlText = document.getElementById('share-url-text').value;
            const bSuccess = copyToClipboard(urlText);
            if (bSuccess) {
                showNotification("📋 分享連結複製成功！快發到群組吧。");
                closeShareModal();
            } else {
                showNotification("複製失敗，請手動全選複製", "error");
            }
        };

        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            let success = false;
            try {
                success = document.execCommand('copy');
            } catch (err) {
                console.error("Fallback copy failed", err);
            }
            document.body.removeChild(textArea);
            return success;
        }

        // 氣象衛星即時資訊抓取
        async function fetchWeather() {
            const currentDayObj = shikokuDb.days.find(d => d.day === currentDayFilter);
            if (!currentDayObj) return;

            const locKey = currentDayObj.location;
            const coord = weatherCoords[locKey];
            if (!coord) return;

            const cityLabel = document.getElementById('weather-city');
            const tempLabel = document.getElementById('weather-temp');
            const descLabel = document.getElementById('weather-desc');
            const windLabel = document.getElementById('weather-wind');

            cityLabel.innerText = `${coord.name}市`;

            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lon}&current_weather=true`);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                const wind = data.current_weather.windspeed;

                tempLabel.innerText = `${temp}°C`;
                windLabel.innerText = `風速: ${wind} km/h`;

                let weatherText = "☀️ 盛夏晴朗";
                if (code > 0 && code <= 3) weatherText = "🌤️ 多雲偏晴";
                else if (code >= 45 && code <= 48) weatherText = "🌫️ 局部有霧";

                <div class="bg-amber-50 border border-amber-200 p-2.5 rounded-xl space-y-1">
                    <div class="text-[10px] font-black text-amber-800 flex items-center gap-1">
                        <i class="fa-solid fa-compass"></i> MIO MIO 導遊隨行攻略與必買必吃
                    </div>
                    <p class="text-[10px] text-slate-700 leading-relaxed font-normal">${slot.tips}</p>
                </div>

                <div class="grid grid-cols-2 gap-2.5 pt-1">
                    <div class="p-2 bg-slate-50 border border-slate-200 rounded-lg text-center">
                        <span class="text-[8px] text-slate-400 font-bold uppercase block">車機導航代碼</span>
                        <span class="text-xs font-black text-slate-800">${slot.mapcode}</span>
                    </div>
                    ${slot.gmaps ? `
                        <a href="${slot.gmaps}" target="_blank" class="p-2 bg-[#1A303A] text-white rounded-lg text-center font-black text-xs flex items-center justify-center gap-1.5 shadow-md">
                            <i class="fa-solid fa-map text-[10px]"></i> 開啟地圖
                        </a>
                    ` : `
                        <div class="p-2 bg-slate-100 text-slate-300 rounded-lg text-center font-black text-xs flex items-center justify-center">
                            無須導航
                        </div>
                    `}
                </div>
            `;

            modal.classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        // 預設啟動與載入邏輯
        window.onload = function () {
            loadAllData();
            switchTab('overview');

            // 檢查安全驗證鎖狀態
            const unlocked = localStorage.getItem('shikoku_unlocked_2026');
            if (unlocked === 'true') {
                dismissSplash();
            }

            if (window.pendingTripData) {
                setTimeout(() => {
                    document.getElementById('import-modal').classList.remove('hidden');
                }, 600);
            }
        }
    </script>
</body>
</html>
